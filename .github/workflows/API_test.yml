name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"

  pull_request:
    branches:
      - main
    paths-ignore:
      - "*.md"

jobs:  
  test_pc_one:
    name: CI | API test | socats 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt install -y  make python3 python3-pip socat

      - name: Install nox
        run: pip install nox

      - name: socats testing
        run: nox -s test_uart_api_socat
  

