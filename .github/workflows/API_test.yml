name: UART API Validation

on:
  push:
  pull_request:

jobs:
  uart-api-test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y socat build-essential

    - name: Build program
      run: |
        make

    - name: Test invalid device path
      run: |
        set +e
        ./uart_test /dev/invalidUART 115200 8 N 1
        test $? -eq 103

    - name: Test invalid databits
      run: |
        set +e
        socat -d -d pty,raw,echo=0 pty,raw,echo=0 &
        sleep 1

        DEV=$(ls /dev/pts | tail -n 1)
        ./uart_test /dev/pts/$DEV 115200 9 N 1
        test $? -eq 102

    - name: Test invalid parity
      run: |
        set +e
        socat -d -d pty,raw,echo=0 pty,raw,echo=0 &
        sleep 1

        DEV=$(ls /dev/pts | tail -n 1)
        ./uart_test /dev/pts/$DEV 115200 8 X 1
        test $? -eq 102

    - name: Test invalid stopbits
      run: |
        set +e
        socat -d -d pty,raw,echo=0 pty,raw,echo=0 &
        sleep 1

        DEV=$(ls /dev/pts | tail -n 1)
        ./uart_test /dev/pts/$DEV 115200 8 N 3
        test $? -eq 102

    - name: Test transmit correctness
      run: |
        socat -d -d pty,raw,echo=0 pty,raw,echo=0 > socat.log 2>&1 &
        sleep 2

        DEV1=$(grep -m1 "PTY is" socat.log | awk '{print $NF}')
        DEV2=$(grep -m2 "PTY is" socat.log | tail -n1 | awk '{print $NF}')

        cat "$DEV2" > capture.txt &
        sleep 1

        ./uart_test "$DEV1" 115200 8 N 1 || true

        sleep 1

        grep "UART test message" capture.txt

    - name: Test receive correctness
      run: |
        socat -d -d pty,raw,echo=0 pty,raw,echo=0 > socat.log 2>&1 &
        sleep 2

        DEV1=$(grep -m1 "PTY is" socat.log | awk '{print $NF}')
        DEV2=$(grep -m2 "PTY is" socat.log | tail -n1 | awk '{print $NF}')

        (sleep 1; echo "ACK: UART test message" > "$DEV2") &

        ./uart_test "$DEV1" 115200 8 N 1 > output.txt || true

        grep "ACK:" output.txt

    - name: Test timeout behaviour
      run: |
        socat -d -d pty,raw,echo=0 pty,raw,echo=0 > socat.log 2>&1 &
        sleep 2

        DEV=$(grep -m1 "PTY is" socat.log | awk '{print $NF}')

        START=$(date +%s)

        ./uart_test "$DEV" 115200 8 N 1 || true

        END=$(date +%s)

        DIFF=$((END - START))

        echo "Elapsed: $DIFF seconds"

        test "$DIFF" -ge 5

    - name: Test permission denied handling
      run: |
        sudo touch fake_uart
        sudo chmod 000 fake_uart

        set +e
        ./uart_test fake_uart 115200 8 N 1
        test $? -eq 103

    - name: exit
      run: |
        socat -d -d pty,raw,echo=0 pty,raw,echo=0 > socat.log 2>&1 &
        sleep 2

        DEV=$(grep -m1 "PTY is" socat.log | awk '{print $NF}')

        ./uart_test "$DEV" 115200 8 N 1 || true

        echo "Program exited cleanly"

        